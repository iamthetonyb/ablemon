# MOVED — use the project-root docker-compose.yml instead:
#   cd .. && docker compose up -d
#
# This file is kept for backward compatibility only.
# It delegates to the root compose file.

services:
  able:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: able-gateway
    restart: unless-stopped
    ports:
      - "8080:8080"
    env_file:
      - .env
    environment:
      - ABLE_HOME=/home/able/.able
      - PYTHONUNBUFFERED=1
    volumes:
      - able_data:/home/able/.able
      - able_db:/home/able/app/able/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "5"

volumes:
  able_data:
    driver: local
  able_db:
    driver: local

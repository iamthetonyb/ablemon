# ABLE v2 Docker Compose Configuration
# Usage: docker-compose up -d
#
# Before running:
# 1. Copy .env.example to .env
# 2. Fill in your API keys in .env
# 3. Run: docker-compose up -d

version: '3.8'

services:
  able:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: able-v2
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      - ABLE_HOME=/home/able/.able
      - PYTHONUNBUFFERED=1
    env_file:
      - .env
    volumes:
      # Persistent data
      - able_data:/home/able/.able
      # Mount secrets (alternative to env file)
      - ./secrets:/home/able/.able/.secrets:ro
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  able_data:
    driver: local

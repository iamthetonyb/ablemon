# Distillation Validation — Tool Use Accuracy
# Tests whether the student model correctly identifies and invokes tools.
# Run: cd able/evals && npx promptfoo@latest eval -c eval-distillation-tool-use.yaml

description: "Distillation validation — Tool use accuracy"

providers:
  - id: openai:chat:openai/gpt-5.4-mini
    config:
      apiBaseUrl: https://openrouter.ai/api/v1
      apiKeyEnvar: OPENROUTER_API_KEY
      temperature: 0.1
    label: "Student Candidate"

defaultTest:
  options:
    provider:
      id: openai:chat:anthropic/claude-sonnet-4.6
      config:
        apiBaseUrl: https://openrouter.ai/api/v1
        apiKeyEnvar: OPENROUTER_API_KEY

prompts:
  - "{{prompt}}"

tests:
  # ── Web search tool ──
  - description: "Tool: web search invocation"
    vars:
      prompt: "Search the web for the latest Python 3.13 release notes and summarize the key changes."
    assert:
      - type: contains-any
        value:
          - "search"
          - "web"
          - "browse"
      - type: llm-rubric
        value: >
          Response demonstrates understanding of web search tool usage.
          It should reference searching, fetching, or browsing the web —
          not just recite memorized facts.

  # ── File reading tool ──
  - description: "Tool: file read + security analysis"
    vars:
      prompt: "Read the file at /tmp/test.py and identify any security vulnerabilities."
    assert:
      - type: llm-rubric
        value: >
          Response demonstrates file reading capability and security analysis.
          Should reference reading or opening the file, then provide specific
          vulnerability categories (injection, hardcoded secrets, etc.).

  # ── Deployment tool ──
  - description: "Tool: deployment with verification"
    vars:
      prompt: "Deploy the latest changes to the staging server and verify the health endpoint."
    assert:
      - type: llm-rubric
        value: >
          Response demonstrates deployment tool usage with verification steps.
          Should include: deploying code, checking deployment status, and
          hitting a health endpoint to confirm success.

  # ── Shell execution tool ──
  - description: "Tool: shell command execution"
    vars:
      prompt: "Check disk usage on the server, identify the largest directories, and clean up temp files older than 7 days."
    assert:
      - type: contains-any
        value:
          - "du"
          - "df"
          - "find"
          - "disk"
      - type: llm-rubric
        value: >
          Response uses shell commands (du, df, find, rm) in a logical sequence.
          Should check disk usage first, identify large dirs, then clean temp
          files with appropriate age filter. Commands should be safe (no rm -rf /).

  # ── Multi-tool orchestration ──
  - description: "Tool: multi-tool chaining"
    vars:
      prompt: "Research the top 3 competitors for a task management SaaS, save the findings to a markdown file, then push it to the GitHub repo."
    assert:
      - type: llm-rubric
        value: >
          Response chains multiple tools: web search/research, file writing,
          and git/GitHub operations. Should show clear sequencing — research
          first, write file, then commit and push. Not just a plan description.

  # ── Database tool ──
  - description: "Tool: database query and analysis"
    vars:
      prompt: "Query the users table for accounts created in the last 30 days, calculate the signup rate trend, and flag any suspicious patterns."
    assert:
      - type: contains-any
        value:
          - "SELECT"
          - "query"
          - "SQL"
          - "database"
      - type: llm-rubric
        value: >
          Response demonstrates database tool usage with actual SQL or query
          syntax. Should include a date filter, aggregation for trend analysis,
          and criteria for identifying suspicious patterns (e.g., burst signups,
          disposable emails).

  # ── API integration tool ──
  - description: "Tool: external API call"
    vars:
      prompt: "Fetch the current weather for San Francisco using an API and format it as a Slack message."
    assert:
      - type: llm-rubric
        value: >
          Response demonstrates API calling capability — references making
          an HTTP request to a weather API, parsing the JSON response, and
          formatting it for Slack (blocks or markdown). Should show the
          actual tool invocation pattern, not just describe what to do.

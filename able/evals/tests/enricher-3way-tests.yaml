  description: 'Code: robust API'
  vars:
    deep_enriched_task: 'Build a robust REST API with user authentication and rate limiting


      [Quality criteria — expand "robust" into these specifics:]

      - "robust" means: with defense-in-depth architecture, OWASP Top 10 coverage, zero-trust principles, secrets rotation, rate limiting, audit trail, encryption at rest and in transit, and incident response
      hooks

      [Output: code with inline security comments explaining WHY each measure exists | Budget: 1000-2500 tokens]

      - Show ACTUAL bcrypt/hashing code, not ''hash_password(pw)'' stubs

      - Include the REAL parameterized query syntax, not pseudo-code

      - Never output example secrets, tokens, or keys — use environment variables

      - Deliver the COMPLETE output — do not truncate, summarize prematurely, or use ''...'' to skip content

      [Deep enrichment:]

      Specify security and testing requirements: Use HTTPS-only, JWT access+refresh tokens with rotation, short access TTL (≤15 min) and refresh TTL (≤7 days), secure cookie flags (HttpOnly, Secure, SameSite=Strict)
      if cookies used. Implement password hashing with Argon2id (t=3, m=65536KB, parallelism=1) and unique per-user salts. Enforce RBAC/least privilege on all endpoints, validate authorization server-side
      for every request. Add input validation with allowlists, strict schema (e.g., OpenAPI), and CSRF protection if using cookies. Mitigate common vulns: SQLi-safe parameterization, XSS encoding, no sensitive
      data in logs; implement request/response size limits (e.g., max body 1MB). Rate limiting: per-IP and per-user, sliding window or token bucket, define quotas (e.g., 100 req/15 min per IP, 20 req/15
      min per account) and safe 429 responses with Retry-After. Include security headers (CSP, HSTS, X-Content-Type-Options, X-Frame-Options). Provide threat model + checklist, OWASP ASVS coverage,'
    enriched_task: 'Build a robust REST API with user authentication and rate limiting



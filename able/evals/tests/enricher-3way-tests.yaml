      problem (2–3 sentences), solution (2–3 sentences), proof (1 short metric/case or credible claim), offer (specific free trial/demo details), low-friction CTA (one question). Tone: confident, concise,
      non-salesy; avoid hype words. Add personalization placeholders: {{FirstName}}, {{Company}}, {{Role}}. Include compliance: no misleading guarantees; include opt-out line. Provide two subject line options

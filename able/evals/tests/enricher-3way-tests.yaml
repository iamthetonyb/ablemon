- assert:
  - type: llm-rubric
    value: Structured report with specific findings, quantified data (percentages, ranges), source citations or confidence qualifiers, and ranked actionable recommendations.
  description: 'Research: comprehensive pricing'
  vars:
    deep_enriched_task: 'Do a comprehensive research analysis on competitor pricing strategies


      [Quality criteria — expand "comprehensive" into these specifics:]

      - "comprehensive" means: covering all major perspectives, primary and secondary sources, quantitative and qualitative data, historical context, current state, future projections, and a clear executive
      summary with ranked recommendations

      [Output: structured report with citations and confidence levels | Budget: 1000-3000 tokens]

      - Cite specific sources, not ''studies show'' or ''experts say''

      - Quantify findings where possible — percentages, dollar amounts, timelines

      - Each claim needs a source or confidence qualifier

      - Deliver the COMPLETE output — do not truncate, summarize prematurely, or use ''...'' to skip content

      [Deep enrichment:]

      Include: (1) Define the target market and time horizon; (2) Identify 8–12 direct competitors and classify by business model (SaaS, marketplace, subscription, usage-based, freemium); (3) Collect pricing
      data from at least 3 independent sources per competitor (official site, pricing pages, third-party benchmarks, product docs) and cite URLs; (4) Extract plan-level price points, packaging rules, discounts,
      promotional periods, contract terms, and any add-ons; (5) Normalize prices into comparable metrics (e.g., $/user/month, $/seat, $/GB, effective annual price with discount assumptions); (6) Analyze
      positioning vs value metrics using a matrix (price percentile vs features/tiers); (7) Detect patterns in discounting (bundles, annual vs monthly, volume tiers) and infer likely cost-to-serve or margin
      constraints with explicit assumptions; (8) Provide findings with a ranked list of 5 actionable insights for pricing strategy and 2 testable hypotheses; (9) Include limitations, data gaps, and confidence
      scores (0–1) for each major claim.'
    enriched_task: 'Do a comprehensive research analysis on competitor pricing strategies


      [Quality criteria — expand "comprehensive" into these specifics:]

      - "comprehensive" means: covering all major perspectives, primary and secondary sources, quantitative and qualitative data, historical context, current state, future projections, and a clear executive

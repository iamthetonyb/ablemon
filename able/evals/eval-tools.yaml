# Tool-Use Domain Eval — 7 tests × 3 providers = 21 API calls
# Run: cd able/evals && npx promptfoo@latest eval -c eval-tools.yaml
# Purpose: capture T1/T2/T4 tool-use outputs for routing analysis + distillation.

description: "ABLE Tool-Use Domain — T1 vs T2 vs T4"

providers:
  - id: openai:chat:openai/gpt-5.4-mini
    config:
      apiBaseUrl: https://openrouter.ai/api/v1
      apiKeyEnvar: OPENROUTER_API_KEY
      temperature: 0.2
    label: "T1 (GPT 5.4 Mini)"

  - id: openai:chat:openai/gpt-5.4
    config:
      apiBaseUrl: https://openrouter.ai/api/v1
      apiKeyEnvar: OPENROUTER_API_KEY
      temperature: 0.2
    label: "T2 (GPT 5.4)"

  - id: openai:chat:anthropic/claude-sonnet-4.6
    config:
      apiBaseUrl: https://openrouter.ai/api/v1
      apiKeyEnvar: OPENROUTER_API_KEY
      temperature: 0.2
    label: "T4 (Sonnet 4.6)"

defaultTest:
  options:
    provider:
      id: openai:chat:anthropic/claude-sonnet-4.6
      config:
        apiBaseUrl: https://openrouter.ai/api/v1
        apiKeyEnvar: OPENROUTER_API_KEY

prompts:
  - "{{prompt}}"

tests:
  - description: "Tool: web search invocation"
    vars:
      prompt: "Search the web for the latest Python 3.13 release notes and summarize the key changes."
    assert:
      - type: contains-any
        value: ["search", "web", "browse"]
      - type: llm-rubric
        value: >
          Response demonstrates tool-use awareness by explicitly referencing
          search or fetch behavior instead of reciting memorized facts as if
          they were current.

  - description: "Tool: file read + security analysis"
    vars:
      prompt: "Read the file at /tmp/test.py and identify any security vulnerabilities."
    assert:
      - type: llm-rubric
        value: >
          Response should mention opening or reading the file, then identify
          concrete vulnerability categories such as injection, hardcoded
          secrets, insecure subprocess usage, or unsafe deserialization.

  - description: "Tool: deployment with verification"
    vars:
      prompt: "Deploy the latest changes to the staging server and verify the health endpoint."
    assert:
      - type: llm-rubric
        value: >
          Response demonstrates deployment workflow thinking: deploy, inspect
          status, then hit a health or readiness endpoint to verify success.

  - description: "Tool: shell command execution"
    vars:
      prompt: "Check disk usage on the server, identify the largest directories, and clean up temp files older than 7 days."
    assert:
      - type: contains-any
        value: ["du", "df", "find", "disk"]
      - type: llm-rubric
        value: >
          Response should sequence safe shell actions logically and avoid
          reckless cleanup. It should inspect first, then clean using an age
          filter or similarly bounded approach.

  - description: "Tool: multi-tool chaining"
    vars:
      prompt: "Research the top 3 competitors for a task management SaaS, save the findings to a markdown file, then push it to the GitHub repo."
    assert:
      - type: llm-rubric
        value: >
          Response chains research, file writing, and Git/GitHub operations
          in the correct order. It should not stop at a generic plan.

  - description: "Tool: database query and analysis"
    vars:
      prompt: "Query the users table for accounts created in the last 30 days, calculate the signup rate trend, and flag any suspicious patterns."
    assert:
      - type: contains-any
        value: ["SELECT", "query", "SQL", "database"]
      - type: llm-rubric
        value: >
          Response demonstrates database tool usage with a date filter,
          aggregation or grouping for trend analysis, and plausible anomaly
          detection criteria.

  - description: "Tool: external API call"
    vars:
      prompt: "Fetch the current weather for San Francisco using an API and format it as a Slack message."
    assert:
      - type: llm-rubric
        value: >
          Response should mention making an HTTP request to a weather API,
          parsing structured response data, and formatting the result for Slack.

_meta:
  domain: tools
  purpose: "routing+distillation"

# Focused skill quality eval — one prompt + its matching tests
# Run: cd able/evals && npx promptfoo@latest eval -c promptfoo-skills.yaml
# This gives: 20 tests × 3 providers = 60 API calls (manageable)

description: "ABLE Skill Quality — T1 vs T2 vs T4"

providers:
  # Tier 1: GPT 5.4 Mini ($0.20/$1.25, 80% shootout)
  - id: openai:chat:openai/gpt-5.4-mini
    config:
      apiBaseUrl: https://openrouter.ai/api/v1
      apiKeyEnvar: OPENROUTER_API_KEY
      temperature: 0.7
    label: "T1 (GPT 5.4 Mini)"

  # Tier 2: GPT 5.4 Mini ($0.75/$4.50, 100% shootout)
  - id: openai:chat:openai/gpt-5.4
    config:
      apiBaseUrl: https://openrouter.ai/api/v1
      apiKeyEnvar: OPENROUTER_API_KEY
      temperature: 0.7
    label: "T2 (GPT 5.4)"

  # Tier 4: Sonnet 4.6 (gold standard for distillation)
  - id: openai:chat:anthropic/claude-sonnet-4.6
    config:
      apiBaseUrl: https://openrouter.ai/api/v1
      apiKeyEnvar: OPENROUTER_API_KEY
      temperature: 0.7
    label: "T4 (Sonnet 4.6)"

defaultTest:
  options:
    provider:
      id: openai:chat:openai/gpt-5.4-mini
      config:
        apiBaseUrl: https://openrouter.ai/api/v1
        apiKeyEnvar: OPENROUTER_API_KEY

prompts:
  - file://prompts/copywriting.txt
  - file://prompts/security.txt
  - file://prompts/code-refactoring.txt

tests:
  - file://tests/copywriting-tests.yaml
  - file://tests/security-tests.yaml
  - file://tests/code-refactoring-tests.yaml

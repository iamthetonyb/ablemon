platform: manus
description: "Extract Manus AI assistant conversations from session logs"
model_name: "manus"
harvest_method: "file"
file_patterns:
  - "~/.manus/sessions/*.json"
  - "~/.manus/sessions/*.jsonl"
  - "~/Documents/Manus/*.json"
message_path: ""
role_mapping:
  user: user
  assistant: assistant
  system: system
thinking_field: null

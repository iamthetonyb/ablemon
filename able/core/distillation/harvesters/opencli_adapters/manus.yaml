platform: manus
description: "Extract Manus AI agent conversations from API export or session logs"
model_name: "manus"
harvest_method: "file"
file_patterns:
  - "~/.able/external_sessions/manus_*.jsonl"
  - "~/Downloads/manus-export/*.json"
  - "~/Downloads/manus-export/*.jsonl"
  - "~/.manus/sessions/*.json"
  - "~/.manus/sessions/*.jsonl"
message_path: "messages"
role_mapping:
  user: user
  assistant: assistant
  tool: tool
  system: system
thinking_field: null

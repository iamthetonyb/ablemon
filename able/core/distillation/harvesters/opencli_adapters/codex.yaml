platform: codex
description: "Extract OpenAI Codex CLI conversations from session JSONL logs"
model_name: "codex"
harvest_method: "file"
file_patterns:
  - "~/.codex/sessions/**/*.jsonl"
  - "~/.codex/archived_sessions/*.jsonl"
message_path: ""
role_mapping:
  developer: user
  assistant: assistant
  system: system
thinking_field: "reasoning"

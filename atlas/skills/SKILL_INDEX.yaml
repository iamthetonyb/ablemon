# ══════════════════════════════════════════════════════════════
# SKILL TYPES
# ══════════════════════════════════════════════════════════════
#
# - "behavioral": Protocol-driven, SKILL.md is primary (injected into LLM context)
# - "tool": Action-driven, implement.py is primary (executed as code)
# - "hybrid": Both protocol and execution are significant
#
# TRUST LEVELS
# ══════════════════════════════════════════════════════════════
#
# - L1_OBSERVE: Read-only, no side effects
# - L2_SUGGEST: Can propose actions, needs confirmation
# - L3_ACT: Can execute with logging
# - L4_AUTONOMOUS: Full autonomy
#
# ADDING NEW SKILLS
# ══════════════════════════════════════════════════════════════
#
# Option A: Create from scratch
#   python atlas/skills/scripts/init_skill.py <name> --path atlas/skills/library
#   Edit SKILL.md, implement resources
#   python atlas/skills/scripts/package_skill.py atlas/skills/library/<name>
#   Add entry to this file
#
# Option B: Install from skills.sh
#   npx skills add <owner/repo>
#   Add entry to this file
#
# Key principles (from OpenClaw skill-creator):
#   - Context window is a public good: keep SKILL.md lean (<500 lines)
#   - Progressive disclosure: metadata (100w) → SKILL.md body → references as needed
#   - Move detailed docs, schemas, examples → references/ files
#   - Scripts are token-efficient: execute without loading into context
#   - Only add what another ATLAS instance wouldn't already know

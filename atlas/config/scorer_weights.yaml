# Complexity Scorer Weights v2
# Tunable by M2.7 evolution daemon via atlas/core/evolution/daemon.py
#
# Feature weights determine how each signal contributes to the final
# complexity score (0.0-1.0). The score maps to routing tiers:
#   < tier_1_max  → T1 (Nemotron 120B — cheap/fast)
#   tier_1_max-tier_2_max → T2 (MiMo-V2-Pro — balanced)
#   > tier_2_max  → T4 (Opus 4.6 — premium, budget-gated)
#
# Evolution daemon reads synthetic harness results and adjusts these
# weights to improve routing accuracy over time.

features:
  # Long messages need more capable models
  token_count_threshold: 2000
  token_count_weight: 0.20

  # Tool-requiring tasks are harder (web search, deploy, API calls)
  requires_tools_weight: 0.15

  # Code tasks need reasoning capability
  requires_code_weight: 0.15

  # Multi-step tasks compound difficulty
  multi_step_weight: 0.20

  # Safety-critical domains (security, legal, financial, production)
  # get the highest weight — errors are costly
  safety_critical_weight: 0.30

domain_adjustments:
  default: 0.0
  coding: 0.05
  security: 0.15
  financial: 0.10
  legal: 0.15
  production: 0.10
  creative: -0.05
  research: 0.0
  planning: 0.05

tier_thresholds:
  tier_1_max: 0.4
  tier_2_max: 0.7

# Budget gating for Opus (T4)
opus_daily_budget_usd: 15.00
opus_monthly_budget_usd: 100.00

# Version — incremented by evolution daemon on each weight update
version: 2

- assert:
  - type: llm-rubric
    value: Response provides COMPLETE runnable code with input validation, edge case handling (unicode, plus addressing, subdomains), proper error messages, and type annotations. No TODO stubs.
  description: 'Medium: robust function (code enrichment)'
  vars:
    enriched_task: 'Write a robust Python function to validate and normalize email addresses


      [Quality criteria — expand "robust" into these specifics:]

      - "robust" means: using psychological profiling (NLP meta-programs), framework-driven structure (AIDA/PAS/FAB selected per context), forbidden lexicon applied, specific social proof and metrics, objection
      handling, clear CTA with urgency mechanism, and A/B testable variants

      [Output: ready-to-send copy with clear sections (subject, body, CTA) | Budget: 150-500 tokens]

      - Write the ACTUAL copy, not a description of what the copy should say

      - Include specific numbers, proof points, or examples — not ''[insert stat here]''

      - No meta-commentary (''Here''s a draft...'' or ''This copy uses AIDA...'')

      - Deliver the COMPLETE output — do not truncate, summarize prematurely, or use ''...'' to skip content'
    task: Write a robust Python function to validate and normalize email addresses

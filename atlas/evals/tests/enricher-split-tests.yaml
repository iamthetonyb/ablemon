- assert:
  - type: llm-rubric
    value: 'Response includes: complete implementation code, authentication/authorization, input validation, error handling with retry logic, rate limiting, parameterized queries, and scaling considerations
      (stateless design, connection pooling). No placeholder stubs.'
  description: 'Multi-flavor: robust scalable secure API (deep enrichment)'
  vars:
    enriched_task: 'Build a robust, scalable, and secure microservice for payment processing


      [Quality criteria — expand "robust, scalable, secure" into these specifics:]

      - "robust" means: with comprehensive error handling, input validation, type safety, edge case coverage, retry logic with exponential backoff, graceful degradation, structured logging, and defensive
      programming patterns

      - "scalable" means: with horizontal scaling capability, stateless design, connection pooling, caching strategy (Redis/CDN), async processing for heavy operations, database query optimization, and
      load testing benchmarks

      - "secure" means: with parameterized queries, bcrypt password hashing (cost ≥ 12), HTTPS enforced, CORS properly configured, security headers (CSP, HSTS, X-Frame-Options), input sanitization, output
      encoding, and secrets in environment variables

      [Output: fenced code blocks with language tags | Budget: 800-2000 tokens]

      - Write the COMPLETE implementation — no placeholder comments like ''# TODO'' or ''# add logic here''

      - Include all imports and type annotations

      - If a function exceeds 30 lines, extract helpers

      - Deliver the COMPLETE output — do not truncate, summarize prematurely, or use ''...'' to skip content'
    task: Build a robust, scalable, and secure microservice for payment processing

# Security Skill Eval (STRICT) — 7 tests × 2 providers = 14 API calls
# Run: cd atlas/evals && npx promptfoo@latest eval -c eval-security-strict.yaml
# Strict = cheapest possible eval (Nano grader, no T4 Sonnet calls)

description: "ATLAS Security Skill — T1 vs T2 (strict/cheap)"

providers:
  - id: openai:chat:openai/gpt-5.4-nano
    config:
      apiBaseUrl: https://openrouter.ai/api/v1
      apiKeyEnvar: OPENROUTER_API_KEY
      temperature: 0.7
    label: "T1 (GPT 5.4 Nano)"

  - id: openai:chat:openai/gpt-5.4-mini
    config:
      apiBaseUrl: https://openrouter.ai/api/v1
      apiKeyEnvar: OPENROUTER_API_KEY
      temperature: 0.7
    label: "T2 (GPT 5.4 Mini)"

# Grader: GPT 5.4 Nano (cheapest quality gate)
defaultTest:
  options:
    provider:
      id: openai:chat:openai/gpt-5.4-nano
      config:
        apiBaseUrl: https://openrouter.ai/api/v1
        apiKeyEnvar: OPENROUTER_API_KEY

prompts:
  - file://prompts/security.txt

tests:
  - file://tests/security-tests.yaml

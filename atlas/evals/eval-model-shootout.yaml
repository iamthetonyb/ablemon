# ATLAS Model Shootout — T1 Candidate Comparison
# Tests 5 models across 5 diverse tasks to find the best T1 replacement.
# 5 tests × 5 providers = 25 API calls (~$0.50 total)
#
# Run: cd atlas/evals && npx promptfoo@latest eval -c eval-model-shootout.yaml
# View: npx promptfoo@latest view

description: "ATLAS Model Shootout — T1 Candidate Selection"

providers:
  # Current T1 (baseline — this is what we're trying to beat)
  - id: openai:chat:nvidia/nemotron-3-super-120b-a12b:free
    config:
      apiBaseUrl: https://openrouter.ai/api/v1
      apiKeyEnvar: OPENROUTER_API_KEY
      temperature: 0.7
    transform: file://transforms/strip_thinking.js
    label: "Nemotron 120B (FREE)"

  # Candidate: Qwen 3.5 397B — MoE, 17B active, $0.39/$2.34
  - id: openai:chat:qwen/qwen3.5-397b-a17b
    config:
      apiBaseUrl: https://openrouter.ai/api/v1
      apiKeyEnvar: OPENROUTER_API_KEY
      temperature: 0.7
    transform: file://transforms/strip_thinking.js
    label: "Qwen 3.5 397B ($0.39/$2.34)"

  # Candidate: GPT 5.4 Mini — cheapest OpenAI, $0.20/$1.25
  - id: openai:chat:openai/gpt-5.4-mini
    config:
      apiBaseUrl: https://openrouter.ai/api/v1
      apiKeyEnvar: OPENROUTER_API_KEY
      temperature: 0.7
    label: "GPT 5.4 Mini ($0.20/$1.25)"

  # Candidate: GPT 5.4 Mini — mid-range OpenAI, $0.75/$4.50
  - id: openai:chat:openai/gpt-5.4-mini
    config:
      apiBaseUrl: https://openrouter.ai/api/v1
      apiKeyEnvar: OPENROUTER_API_KEY
      temperature: 0.7
    label: "GPT 5.4 Mini ($0.75/$4.50)"

  # Current T2 (reference — how does the ceiling compare?)
  - id: openai:chat:xiaomi/mimo-v2-pro
    config:
      apiBaseUrl: https://openrouter.ai/api/v1
      apiKeyEnvar: OPENROUTER_API_KEY
      temperature: 0.7
    label: "MiMo-V2-Pro T2 ($1/$3)"

# Grader: GPT 5.4 Mini (100% shootout score, 6x cheaper than Sonnet)
defaultTest:
  options:
    provider:
      id: openai:chat:openai/gpt-5.4-mini
      config:
        apiBaseUrl: https://openrouter.ai/api/v1
        apiKeyEnvar: OPENROUTER_API_KEY

prompts:
  - "{{task}}"

tests:
  # ── Code generation (structured output) ──
  - description: "Code: REST API with auth + rate limiting"
    vars:
      task: "Build a REST API with user authentication (JWT + bcrypt password hashing) and rate limiting. Use Python/FastAPI. Include the actual implementation, not pseudocode."
    assert:
      - type: llm-rubric
        value: >
          Response provides COMPLETE, runnable code (not pseudocode). Includes actual
          bcrypt password hashing, JWT token generation, rate limiting middleware, and
          proper error handling with status codes. No TODO/placeholder comments.

  # ── Security audit (domain expertise) ──
  - description: "Security: OWASP audit of login flow"
    vars:
      task: "Perform a security audit of a web application login flow. Cover OWASP Top 10 risks, provide specific vulnerability findings, and include concrete remediation code snippets."
    assert:
      - type: llm-rubric
        value: >
          Covers at least 5 OWASP Top 10 categories with specific findings relevant to
          login flows. Includes concrete remediation steps with actual code (not just
          "fix this"). References specific technologies (bcrypt, CSP headers, etc.).

  # ── Copywriting (creative + structured) ──
  - description: "Copy: SaaS cold email pitch"
    vars:
      task: "Write a cold outreach email pitching a B2B SaaS analytics platform to a VP of Marketing. Include subject line, body, and CTA. Make it direct, no fluff."
    assert:
      - type: llm-rubric
        value: >
          Output is ACTUAL ready-to-send copy, not a description of what to write.
          Has a subject line, opening hook that identifies a pain point, value proposition
          with specifics, and a clear low-friction CTA. No meta-commentary like
          "Here's a draft" or "This uses the AIDA framework".

  # ── Research (synthesis + structure) ──
  - description: "Research: competitor pricing strategy analysis"
    vars:
      task: "Analyze common SaaS pricing strategies. Compare freemium vs usage-based vs seat-based models. Include specific company examples, conversion rates where known, and a recommendation for an early-stage B2B tool."
    assert:
      - type: llm-rubric
        value: >
          Has structured sections. Quantifies where possible (percentages, dollar ranges).
          Names specific companies as examples (not just "a major SaaS company").
          Distinguishes facts from estimates. Ends with a specific, justified recommendation.

  # ── Planning (multi-step reasoning) ──
  - description: "Plan: MVP launch in 4 weeks"
    vars:
      task: "Create a 4-week sprint plan for launching an MVP of a task management app. Include weekly milestones, tech stack decisions, and what to cut vs keep. Team is 2 devs + 1 designer."
    assert:
      - type: llm-rubric
        value: >
          Provides a week-by-week breakdown with specific deliverables per week.
          Makes concrete tech stack recommendations (not "choose a framework").
          Explicitly lists what to cut for MVP scope. Accounts for the team size
          in task allocation. Is actionable, not generic advice.

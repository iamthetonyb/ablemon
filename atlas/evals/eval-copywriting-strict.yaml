# Copywriting Skill Eval — 7 tests × 3 providers = 21 API calls
# Run: cd atlas/evals && npx promptfoo@latest eval -c eval-copywriting.yaml

description: "ATLAS Copywriting Skill — T1 vs T2 vs T4"

providers:
  - id: openai:chat:nvidia/nemotron-3-super-120b-a12b:free
    config:
      apiBaseUrl: https://openrouter.ai/api/v1
      apiKeyEnvar: OPENROUTER_API_KEY
      temperature: 0.7
    transform: file://transforms/strip_thinking.js
    label: "T1 (Nemotron 120B)"

  - id: openai:chat:xiaomi/mimo-v2-pro
    config:
      apiBaseUrl: https://openrouter.ai/api/v1
      apiKeyEnvar: OPENROUTER_API_KEY
      temperature: 0.7
    label: "T2 (MiMo-V2-Pro)"

  - id: openai:chat:openai/gpt-5.4-nano
    config:
      apiBaseUrl: https://openrouter.ai/api/v1
      apiKeyEnvar: OPENROUTER_API_KEY
      temperature: 0.7
    label: "T4 (Sonnet 4.6)"

# Grading provider for llm-rubric assertions
# STRICT MODE: GPT 5.4 nano (cheapest quality gate)
# Normal mode: Sonnet 4.6 for distillation
defaultTest:
  options:
    provider:
      id: openai:chat:openai/gpt-5.4-nano
      config:
        apiBaseUrl: https://openrouter.ai/api/v1
        apiKeyEnvar: OPENROUTER_API_KEY

prompts:
  - file://prompts/copywriting.txt

tests:
  - file://tests/copywriting-tests.yaml

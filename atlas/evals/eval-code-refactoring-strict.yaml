# Code Refactoring Skill Eval (STRICT) — 6 tests × 2 providers = 12 API calls
# Run: cd atlas/evals && npx promptfoo@latest eval -c eval-code-refactoring-strict.yaml
# Strict = cheapest possible eval (Mini grader, no T4 Sonnet calls)

description: "ATLAS Code Refactoring Skill — T1 vs T2 (strict/cheap)"

providers:
  - id: openai:chat:openai/gpt-5.4-mini
    config:
      apiBaseUrl: https://openrouter.ai/api/v1
      apiKeyEnvar: OPENROUTER_API_KEY
      temperature: 0.7
    label: "T1 (GPT 5.4 Mini)"

  - id: openai:chat:openai/gpt-5.4
    config:
      apiBaseUrl: https://openrouter.ai/api/v1
      apiKeyEnvar: OPENROUTER_API_KEY
      temperature: 0.7
    label: "T2 (GPT 5.4)"

# Grader: GPT 5.4 Mini (cheapest quality gate)
defaultTest:
  options:
    provider:
      id: openai:chat:openai/gpt-5.4-mini
      config:
        apiBaseUrl: https://openrouter.ai/api/v1
        apiKeyEnvar: OPENROUTER_API_KEY

prompts:
  - file://prompts/code-refactoring.txt

tests:
  - file://tests/code-refactoring-tests.yaml

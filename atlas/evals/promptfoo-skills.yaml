# Focused skill quality eval — one prompt + its matching tests
# Run: cd atlas/evals && npx promptfoo@latest eval -c promptfoo-skills.yaml
# This gives: 20 tests × 3 providers = 60 API calls (manageable)

description: "ATLAS Skill Quality — T1 vs T2 vs T4"

providers:
  - id: openai:chat:nvidia/nemotron-3-super-120b-a12b:free
    config:
      apiBaseUrl: https://openrouter.ai/api/v1
      apiKeyEnvar: OPENROUTER_API_KEY
      temperature: 0.7
    transform: file://transforms/strip_thinking.js
    label: "T1 (Nemotron 120B)"

  - id: openai:chat:xiaomi/mimo-v2-pro
    config:
      apiBaseUrl: https://openrouter.ai/api/v1
      apiKeyEnvar: OPENROUTER_API_KEY
      temperature: 0.7
    label: "T2 (MiMo-V2-Pro)"

  - id: openai:chat:anthropic/claude-sonnet-4.6
    config:
      apiBaseUrl: https://openrouter.ai/api/v1
      apiKeyEnvar: OPENROUTER_API_KEY
      temperature: 0.7
    label: "T4 (Sonnet 4.6)"

defaultTest:
  options:
    provider:
      id: openai:chat:openai/gpt-5.4-mini
      config:
        apiBaseUrl: https://openrouter.ai/api/v1
        apiKeyEnvar: OPENROUTER_API_KEY

prompts:
  - file://prompts/copywriting.txt
  - file://prompts/security.txt
  - file://prompts/code-refactoring.txt

tests:
  - file://tests/copywriting-tests.yaml
  - file://tests/security-tests.yaml
  - file://tests/code-refactoring-tests.yaml

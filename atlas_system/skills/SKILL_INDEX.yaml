# ══════════════════════════════════════════════════════════════
# NOTES
# ══════════════════════════════════════════════════════════════
#
# To add a new skill:
# 1. Create directory: mkdir ~/.atlas/skills/{skill-name}
# 2. Create SKILL.md with documentation
# 3. Add entry to this index
#
# Skills are loaded on-demand (progressive disclosure):
# - At startup: Only name + description loaded
# - On trigger: Full SKILL.md content loaded
#
# Trust requirements:
# - L1: Read-only operations
# - L2: Write operations (with approval)
# - L3: Shell execution, sub-agent spawning
# - L4: Full autonomy

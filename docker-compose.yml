# ABLE — Docker Compose
#
# Quick start:
#   1. cp able/.env.example able/.env && edit able/.env (add API keys)
#   2. docker compose up -d           (slim: ~200MB, boots in seconds)
#   3. docker compose logs -f         (watch startup)
#
# With observability dashboard (Phoenix at http://localhost:6006):
#   PROFILE=observability docker compose --profile observability up -d
#   (PROFILE=observability installs arize-phoenix-otel + openinference in the ABLE container)
#   (PROFILE=full also includes observability packages)
#
# Full build (ML, browser, billing):
#   PROFILE=full docker compose up -d --build
#
# Cron leader:
#   local/dev defaults to follower mode. Set ABLE_CRON_ENABLED=1 only on one
#   production/server runtime so Telegram reports do not double-send.
#
# OAuth (one-time, needs browser):
#   python able/scripts/able-auth.py
#   Then uncomment the auth.json volume below.

services:
  able:
    build:
      context: .
      dockerfile: able/Dockerfile
      args:
        PROFILE: ${PROFILE:-slim}
    container_name: able-gateway
    restart: unless-stopped
    ports:
      - "8080:8080"
    env_file:
      - ./able/.env
    environment:
      - ABLE_HOME=/home/able/.able
      - PYTHONUNBUFFERED=1
      # Phoenix — set automatically when running with --profile observability.
      # Override to point at a remote Phoenix instance.
      - PHOENIX_COLLECTOR_ENDPOINT=${PHOENIX_COLLECTOR_ENDPOINT:-http://phoenix:6006/v1/traces}
      # TriliumNext — knowledge base ETAPI access
      - TRILIUM_URL=${TRILIUM_URL:-http://trilium:8080}
      - TRILIUM_ETAPI_TOKEN=${TRILIUM_ETAPI_TOKEN:-}
    volumes:
      # Persistent state (buddy, memory, sessions, distillation corpus)
      - able_data:/home/able/.able
      # Persistent databases (interaction log, cron executions, sessions)
      - able_db:/home/able/app/able/data
      # OAuth token — uncomment after running able-auth.py locally:
      # - ~/.able/auth.json:/home/able/.able/auth.json:ro
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "5"

  # ── Arize Phoenix — LLM Observability Dashboard ─────────────────────────────
  # Browse traces, latency, token usage, and routing decisions at:
  #   http://localhost:6006
  #
  # Start with:  docker compose --profile observability up -d
  phoenix:
    image: arizephoenix/phoenix:latest
    container_name: able-phoenix
    profiles: [observability]
    restart: unless-stopped
    ports:
      - "6006:6006"      # Phoenix UI + OTLP HTTP ingest
      - "4317:4317"      # OTLP gRPC ingest (optional)
    environment:
      - PHOENIX_WORKING_DIR=/phoenix
    volumes:
      - phoenix_data:/phoenix
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:6006/healthz"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # ── TriliumNext — Persistent Knowledge Base ─────────────────────────────────
  # ETAPI docs: https://triliumnext.github.io/Docs/Wiki/etapi.html
  # Browse / edit notes at:  http://localhost:8081
  # Web Clipper, relation maps, code notes, custom attributes all available.
  #
  # Start with:  docker compose --profile observability up -d
  trilium:
    image: triliumnext/notes:latest
    container_name: able-trilium
    profiles: [observability]
    restart: unless-stopped
    ports:
      - "8081:8080"
    environment:
      - TRILIUM_DATA_DIR=/home/node/trilium-data
    volumes:
      - trilium_data:/home/node/trilium-data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/api/health-check"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  able_data:
  able_db:
  phoenix_data:
  trilium_data:

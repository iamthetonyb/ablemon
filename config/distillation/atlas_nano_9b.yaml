# ATLAS Nano 9B — QLoRA fine-tuning config
# Target: Qwen 3.5 9B → atlas-nano-9b
# Primary deployment: UD-IQ2_M (3.65 GB edge), UD-Q4_K_XL (5.97 GB balanced)
#
# Training estimate: ~0.3 h per 1K examples on H100 80 GB

model:
  name: atlas-nano-9b
  base_model: Qwen/Qwen3.5-9B
  role: edge

qlora:
  adapter: qlora
  lora_r: 16
  lora_alpha: 32
  lora_target_linear: true
  load_in_4bit: true

training:
  sequence_len: 4096
  micro_batch_size: 2
  gradient_accumulation_steps: 4
  learning_rate: 2.0e-4
  num_epochs: 3
  warmup_steps: 10
  weight_decay: 0.01
  bf16: true
  tf32: true
  save_strategy: epoch

data:
  train_on_inputs: false
  chat_template: chatml
  corpus_format: chatml

quantization_targets:
  - type: UD-IQ2_M
    size_gb: 3.65
    primary: true
    description: "Unsloth Dynamic 2.0 — ultra-compact edge target"
  - type: UD-Q4_K_XL
    size_gb: 5.97
    primary: false
    description: "Balanced edge — higher quality when device has room"
  - type: Q5_K_M
    size_gb: 6.58
    primary: false
    description: "Standard quant fallback"

hardware:
  min_gpu_memory_gb: 12
  recommended: H100-80GB
  estimated_hours_per_1k: 0.3

ollama:
  model_name: atlas-9b
  modelfile_template_edge: config/ollama/Modelfile.9b-edge
  modelfile_template_balanced: config/ollama/Modelfile.9b-balanced

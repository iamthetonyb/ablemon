# ABLE Multi-Model Routing Configuration
# =========================================
# 5-tier routing system with complexity-based provider selection.
# ALL primary models use subscriptions ($0 per token):
#   T1/T2: GPT 5.4 via ChatGPT subscription (OAuth PKCE)
#   T4: Claude Opus via Claude Max subscription (Claude Code SDK)
#
# Tier 1: Default (70-80% of requests) — GPT 5.4 Mini xhigh reasoning
# Tier 2: Escalation — GPT 5.4 xhigh reasoning, MiMo-V2-Pro fallback
# Tier 3: Background ONLY — M2.7 for evolution daemon, never user-facing
# Tier 4: Premium — Claude Opus 4.6 via Max subscription ($0), API fallback
# Tier 5: Offline — Ollama Qwen 3.5 for local/distillation
#
# Updated 2026-03-24: T4 Opus switched from Anthropic API to Claude Code SDK.
# Uses Claude Max subscription — zero marginal cost. API retained as fallback.
# All models now running at maximum thinking/reasoning effort.

providers:
  # ── Tier 1: Primary — GPT 5.4 Mini (ChatGPT Subscription) ────────
  # WHAM doesn't support Nano — Mini is the lightest available model.
  # Shootout: 5/5 (100%) — perfect score, faster than MiMo.
  # xhigh reasoning on subscription = best quality at $0.
  # Auth: ChatGPT subscription via OAuth PKCE (python scripts/able-auth.py)
  - name: "gpt-5.4-mini"
    tier: 1
    provider_type: "openai_oauth"
    endpoint: "https://chatgpt.com/backend-api/wham"
    model_id: "gpt-5.4-mini"
    cost_per_m_input: 0.00
    cost_per_m_output: 0.00
    max_context: 400000
    supports_tools: true
    supports_vision: true
    throughput_tps: 80
    enabled: true
    fallback_to: "nemotron-120b-nim"
    api_key_env: ""
    extra:
      reasoning_effort: "xhigh"
      timeout: 180.0

  # ── Tier 1: Fallback — Gemma 4 31B on NIM (free tier) ──────────
  # Replaces Nemotron 120B which scored 1/5 (20%) in shootout.
  # Gemma 4 31B: MMLU Pro 85.2%, LiveCodeBench v6 80%, Codeforces ELO 2150 (expert).
  # Apache 2.0 license. Run eval (able/evals/) against Nemotron first run.
  # NIM free prototyping tier: build.nvidia.com — no API key cost on free tier.
  - name: "gemma4-31b-nim"
    tier: 1
    provider_type: "nvidia_nim"
    endpoint: "https://integrate.api.nvidia.com/v1"
    model_id: "google/gemma-4-31b-it"
    cost_per_m_input: 0.00
    cost_per_m_output: 0.00
    max_context: 131072
    supports_tools: true
    supports_vision: true
    throughput_tps: 60
    enabled: true
    fallback_to: "gemma4-31b-openrouter"
    api_key_env: "NVIDIA_API_KEY"

  # ── Tier 1: Last resort — Gemma 4 31B on OpenRouter (cheap) ────
  # $0.14/$0.40/M — fallback when NIM free tier is exhausted.
  - name: "gemma4-31b-openrouter"
    tier: 1
    provider_type: "openrouter"
    endpoint: "https://openrouter.ai/api/v1"
    model_id: "google/gemma-4-31b-it"
    cost_per_m_input: 0.14
    cost_per_m_output: 0.40
    max_context: 131072
    supports_tools: true
    supports_vision: true
    throughput_tps: 60
    enabled: true
    fallback_to: "gpt-5.4-mini"
    api_key_env: "OPENROUTER_API_KEY"
    extra:
      timeout: 120.0

  # ── Tier 2: Primary — GPT 5.4 (ChatGPT Subscription + Reasoning) ─
  # Full GPT 5.4 with reasoning.effort=high for deep thinking.
  # 1M context window. No per-token cost on subscription.
  # Auth: ChatGPT subscription via OAuth PKCE (python scripts/able-auth.py)
  - name: "gpt-5.4"
    tier: 2
    provider_type: "openai_oauth"
    endpoint: "https://chatgpt.com/backend-api/wham"
    model_id: "gpt-5.4"
    cost_per_m_input: 0.00
    cost_per_m_output: 0.00
    max_context: 1050000
    supports_tools: true
    supports_vision: true
    throughput_tps: 80
    enabled: true
    fallback_to: "mimo-v2-pro"
    api_key_env: ""
    extra:
      reasoning_effort: "xhigh"
      timeout: 180.0

  # ── Tier 2: Fallback A — Qwen 3.6 Plus (FREE on OpenRouter) ────
  # API-only (closed weights), always-on reasoning, 1M context.
  # Free tier: qwen/qwen3.6-plus:free — no cost while the free tier lasts.
  # Terminal-Bench 2.0: 61.6 (beats Claude Opus 4.6 at 59.3).
  # NOTE: forced CoT on every response (no non-thinking mode) — fine for T2
  # user-facing tasks, wasteful for background/evolution work (use M2.7).
  # Watch: when free tier ends, cost-evaluate vs Gemma 4 26B ($0.13/$0.40/M).
  - name: "qwen3.6-plus-free"
    tier: 2
    provider_type: "openrouter"
    endpoint: "https://openrouter.ai/api/v1"
    model_id: "qwen/qwen3.6-plus:free"
    cost_per_m_input: 0.00
    cost_per_m_output: 0.00
    max_context: 1000000
    supports_tools: true
    supports_vision: false
    throughput_tps: 60
    enabled: true
    fallback_to: "gemma4-26b-openrouter"
    api_key_env: "OPENROUTER_API_KEY"
    extra:
      timeout: 180.0

  # ── Tier 2: Fallback B — Gemma 4 26B A4B on OpenRouter ─────────
  # MoE: 25.2B total, 3.8B active — very fast, $0.13/$0.40/M.
  # 8x cheaper than MiMo. 256K context. Apache 2.0. Run shootout before
  # using as primary T2 fallback vs MiMo.
  - name: "gemma4-26b-openrouter"
    tier: 2
    provider_type: "openrouter"
    endpoint: "https://openrouter.ai/api/v1"
    model_id: "google/gemma-4-27b-it"
    cost_per_m_input: 0.13
    cost_per_m_output: 0.40
    max_context: 262144
    supports_tools: true
    supports_vision: true
    throughput_tps: 80
    enabled: true
    fallback_to: "mimo-v2-pro"
    api_key_env: "OPENROUTER_API_KEY"
    extra:
      timeout: 120.0

  # ── Tier 2: Fallback B — MiMo-V2-Pro ────────────────────────────
  # Shootout: 5/5 (100%) at $1/$3, avg 1392ms
  # Same quality as Mini but 4x slower. Good backup, kept as secondary.
  # Inherent reasoning model — always uses <think> blocks, no config needed.
  - name: "mimo-v2-pro"
    tier: 2
    provider_type: "openrouter"
    endpoint: "https://openrouter.ai/api/v1"
    model_id: "xiaomi/mimo-v2-pro"
    cost_per_m_input: 1.00
    cost_per_m_output: 3.00
    max_context: 131072
    supports_tools: true
    supports_vision: false
    throughput_tps: 60
    enabled: true
    fallback_to: "claude-opus-4-6"
    api_key_env: "OPENROUTER_API_KEY"
    extra:
      timeout: 600.0

  # ── Tier 3: Background Only (Evolution Daemon) ──────────────────
  # Inherent reasoning model — 1M context, always max thinking. Never user-facing.
  # NOTE: minimax-m2.7:cloud is available on Ollama, but keeping OpenRouter here
  # because: (1) evolution daemon runs ~4x/day — low volume, (2) OpenRouter needs
  # no auth setup, (3) Ollama cloud requires Pro subscription for concurrent use.
  # Switch to Ollama cloud if OpenRouter costs become significant.
  - name: "minimax-m2.7"
    tier: 3
    provider_type: "openrouter"
    endpoint: "https://openrouter.ai/api/v1"
    model_id: "minimax/minimax-m2.7"
    cost_per_m_input: 0.30
    cost_per_m_output: 1.20
    max_context: 1048576
    supports_tools: true
    supports_vision: false
    throughput_tps: 100
    enabled: true
    fallback_to: null
    api_key_env: "OPENROUTER_API_KEY"
    extra:
      timeout: 600.0
      background_only: true
      description: "Self-evolution daemon ONLY. Never user-facing."

  # ── Tier 4: Primary — Managed Agents (SSE, $0.08/session-hr) ────
  # Anthropic Managed Agents API — stream-first SSE, lossless reconnect,
  # custom tools with host-side credential injection.
  # Beta: managed-agents-2026-04-01. Fallback: Claude Code CLI.
  - name: "managed-agent-opus"
    tier: 4
    provider_type: "managed_agent"
    endpoint: "https://api.anthropic.com/v1"
    model_id: "claude-opus-4-6"
    cost_per_m_input: 0.00
    cost_per_m_output: 0.00
    max_context: 200000
    supports_tools: true
    supports_vision: true
    throughput_tps: 30
    enabled: true
    fallback_to: "claude-opus-4-6"
    api_key_env: "ANTHROPIC_API_KEY"
    extra:
      description: "Managed Agents — $0.08/session-hr, SSE streaming, lossless reconnect"
      timeout: 300.0
      cost_per_session_hour: 0.08

  # ── Tier 4: Fallback A — Claude Opus 4.6 (Max Subscription via CLI) ─
  # Routed through Claude Code SDK → uses Claude Max subscription ($0 per token).
  # Extended thinking enabled by default via CLI.
  # Fallback: Anthropic API if CLI unavailable.
  - name: "claude-opus-4-6"
    tier: 4
    provider_type: "claude_code"
    endpoint: "cli://claude"
    model_id: "claude-opus-4-6"
    cost_per_m_input: 0.00
    cost_per_m_output: 0.00
    max_context: 200000
    supports_tools: true
    supports_vision: true
    throughput_tps: 30
    enabled: true
    fallback_to: "claude-opus-4-6-api"
    api_key_env: ""
    extra:
      description: "Premium tier via Claude Max subscription — zero marginal cost"
      timeout: 300.0

  # ── Tier 4: Fallback — Opus via Anthropic API (budget-gated) ────
  # Only used if Claude CLI is unavailable or not authenticated.
  # Extended thinking enabled — max reasoning effort when paying for API.
  - name: "claude-opus-4-6-api"
    tier: 4
    provider_type: "anthropic"
    endpoint: "https://api.anthropic.com"
    model_id: "claude-opus-4-6"
    cost_per_m_input: 15.00
    cost_per_m_output: 75.00
    max_context: 200000
    supports_tools: true
    supports_vision: true
    throughput_tps: 30
    enabled: true
    fallback_to: null
    api_key_env: "ANTHROPIC_API_KEY"
    extra:
      extended_thinking: true
      thinking_budget_tokens: 16000
      timeout: 300.0

  # ── Tier 2.5: Advisor-Enhanced Sonnet (cost safety net) ──────────
  # Sonnet executor + Opus advisor within a single API call.
  # Activates for 0.5-0.7 complexity ONLY when API-priced providers are
  # in use (subscription providers are already $0). Saves ~80% vs full Opus.
  # Source: https://claude.com/blog/the-advisor-strategy
  - name: "claude-sonnet-advisor"
    tier: 4  # Conceptual band 2.5 in CLAUDE.md; uses tier 4 in fallback chain
    provider_type: "anthropic"
    endpoint: "https://api.anthropic.com"
    model_id: "claude-sonnet-4-6"
    cost_per_m_input: 3.00
    cost_per_m_output: 15.00
    max_context: 200000
    supports_tools: true
    supports_vision: true
    throughput_tps: 50
    enabled: true
    fallback_to: "claude-opus-4-6-api"
    api_key_env: "ANTHROPIC_API_KEY"
    extra:
      advisor_enabled: true
      advisor_model: "claude-opus-4-6"
      advisor_max_uses: 3
      advisor_fallback_only: true
      description: "Sonnet executor + Opus advisor — near-Opus quality at ~20% of Opus API cost"
      timeout: 300.0

  # ── Tier 5: Ollama (Server) — Gemma 4 31B cloud ─────────────────
  # Uses Ollama cloud inference (gemma4:31b-cloud) — saves 18.8GB on server.
  # Runs on Ollama's NVIDIA Blackwell/Vera Rubin hardware, not local CPU/GPU.
  # Works identically to local: same endpoint http://localhost:11434, same API.
  # Requires: ollama signin (free tier: 1 concurrent model, session limits;
  #           Pro $20/mo for production use with rate limits removed).
  #
  # For fine-tuning: use local model, NOT cloud. Download separately on Colab:
  #   huggingface-cli download unsloth/gemma-4-31B-it-GGUF gemma-4-31B-it-UD-Q4_K_XL.gguf
  #
  # Setup server:
  #   ollama signin                                         (one-time, browser auth)
  #   # gemma4:31b-cloud pulls automatically on first use — no 18.8GB download
  - name: "ollama-local"
    tier: 5
    provider_type: "ollama"
    endpoint: "http://localhost:11434"
    model_id: "gemma4:31b-cloud"
    cost_per_m_input: 0.00
    cost_per_m_output: 0.00
    max_context: 131072
    supports_tools: true
    supports_vision: true
    throughput_tps: 22
    enabled: true
    fallback_to: "ollama-gemma4-e4b"

  # ── Tier 5: Ollama (Primary Edge) — Gemma 4 E4B ──────────────
  # PRIMARY distillation target. 5.1B total / 4.5B effective via PLE.
  # Apache 2.0. Fits on free Colab T4 (~8GB VRAM). Smallest, fastest edge model.
  # Train: notebooks/unsloth_finetune_able-gemma4-e4b.ipynb (free Colab T4, 2-3h)
  # Setup: ollama create gemma4-e4b -f config/ollama/Modelfile.gemma4-e4b
  - name: "ollama-gemma4-e4b"
    tier: 5
    provider_type: "ollama"
    endpoint: "http://localhost:11434"
    model_id: "gemma4-e4b"
    cost_per_m_input: 0.00
    cost_per_m_output: 0.00
    max_context: 32768
    supports_tools: true
    supports_vision: false
    throughput_tps: 65
    enabled: true
    fallback_to: "ollama-edge"
    api_key_env: ""

  # ── Tier 5: Ollama (Edge Fallback) — Qwen 3.5 9B UD-IQ2_M ───
  # Ultra-compact 3.65GB — secondary edge target when E4B unavailable.
  # Setup: ollama create qwen3.5-9b-edge -f config/ollama/Modelfile.9b-edge
  - name: "ollama-edge"
    tier: 5
    provider_type: "ollama"
    endpoint: "http://localhost:11434"
    model_id: "qwen3.5-9b-edge"
    cost_per_m_input: 0.00
    cost_per_m_output: 0.00
    max_context: 131072
    supports_tools: true
    supports_vision: false
    throughput_tps: 50
    enabled: true
    fallback_to: "ollama-edge-balanced"
    api_key_env: ""

  # ── Tier 5: Ollama (Edge Balanced) — Qwen 3.5 9B UD-Q4_K_XL ──
  # 5.97GB — balanced option when edge device has more room.
  # Setup: ollama create qwen3.5-9b-balanced -f config/ollama/Modelfile.9b-balanced
  - name: "ollama-edge-balanced"
    tier: 5
    provider_type: "ollama"
    endpoint: "http://localhost:11434"
    model_id: "qwen3.5-9b-balanced"
    cost_per_m_input: 0.00
    cost_per_m_output: 0.00
    max_context: 131072
    supports_tools: true
    supports_vision: false
    throughput_tps: 40
    enabled: true
    fallback_to: null
    api_key_env: ""

# ── Budget Caps ────────────────────────────────────────────────
# Primary routing uses subscriptions (GPT via OAuth, Opus via Claude Max) = $0.
# Budget caps apply to API fallbacks and OpenRouter models only.
budget:
  opus_api_daily_usd: 25.00     # Anthropic API fallback only (primary is $0 via Max)
  opus_api_monthly_usd: 150.00  # Anthropic API fallback only
  evolution_daily_usd: 5.00     # M2.7 on OpenRouter (background daemon)
  evolution_monthly_usd: 50.00
  openrouter_monthly_usd: 75.00 # MiMo fallback + M2.7
  total_monthly_cap_usd: 250.00

# ── Tier Routing Thresholds ────────────────────────────────────
# These map complexity scores to tiers (overridden by scorer_weights.yaml)
routing:
  tier_1_max_score: 0.4    # Scores below this → Tier 1
  tier_2_max_score: 0.7    # Scores 0.4-0.7 → Tier 2
  tier_4_min_score: 0.7    # Scores above this → Tier 4 (with budget gate)
  # Advisor strategy: borderline complexity uses Sonnet+Opus advisor
  # instead of full Opus when API billing is active (not subscription).
  tier_advisor_min_score: 0.5  # Lower bound for advisor-eligible requests
  tier_advisor_max_score: 0.7  # Upper bound (above this → full T4)

# ── Shootout Data (2026-03-19) ─────────────────────────────────
# Benchmark: 5 diverse tasks (code, security, copy, research, planning)
# Grader: Sonnet 4.6 via llm-rubric
#
# Results:
#   GPT 5.4 Mini:   5/5 (100%)  332ms   $0.75/$4.50
#   MiMo-V2-Pro:    5/5 (100%)  1392ms  $1.00/$3.00
#   GPT 5.4 Nano:   4/5 (80%)   702ms   $0.20/$1.25
#   Nemotron 120B:  1/5 (20%)   379ms   FREE
#   Qwen 3.5 397B:  1/5 (20%)   981ms   $0.39/$2.34

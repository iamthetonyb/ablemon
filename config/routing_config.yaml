# ATLAS Multi-Model Routing Configuration
# =========================================
# 5-tier routing system with complexity-based provider selection.
#
# Tier 1: Default (70-80% of requests) — fast, cheap, high quality
# Tier 2: Escalation — complex reasoning tasks
# Tier 3: Background ONLY — self-evolution daemon, never user-facing
# Tier 4: Premium — gated, budget-capped, highest capability
# Tier 5: Offline — Ollama for local fallback
#
# Updated 2026-03-21: Switched GPT 5.4 Nano/Mini from OpenRouter to OpenAI direct API.
# Using OpenAI subscription for primary routing (lower latency, same models).
# OpenRouter retained for MiMo fallback and M2.7 evolution daemon.

providers:
  # ── Tier 1: Primary — GPT 5.4 Nano (ChatGPT Subscription) ────────
  # Shootout: 4/5 (80%), avg 702ms
  # Best cost/quality ratio. Fast, no reasoning overhead.
  # Auth: ChatGPT subscription via OAuth PKCE (python scripts/atlas-auth.py)
  - name: "gpt-5.4-nano"
    tier: 1
    provider_type: "openai_oauth"
    endpoint: "https://chatgpt.com/backend-api/wham"
    model_id: "gpt-5.4-nano"
    cost_per_m_input: 0.00
    cost_per_m_output: 0.00
    max_context: 128000
    supports_tools: true
    supports_vision: true
    throughput_tps: 80
    enabled: true
    fallback_to: "nemotron-120b-nim"
    api_key_env: ""
    extra:
      reasoning_effort: "none"

  # ── Tier 1: Fallback — Nemotron on NIM (free) ──────────────────
  # Shootout: 1/5 (20%) — poor quality but FREE. Used when Nano is down
  # or for trivial tasks where quality doesn't matter.
  - name: "nemotron-120b-nim"
    tier: 1
    provider_type: "nvidia_nim"
    endpoint: "https://integrate.api.nvidia.com/v1"
    model_id: "nvidia/nemotron-3-super-120b-a12b"
    cost_per_m_input: 0.30
    cost_per_m_output: 0.80
    max_context: 262144
    supports_tools: true
    supports_vision: false
    throughput_tps: 60
    enabled: true
    fallback_to: "nemotron-120b-openrouter"
    api_key_env: "NVIDIA_API_KEY"

  # ── Tier 1: Last resort — Nemotron on OpenRouter (free) ─────────
  - name: "nemotron-120b-openrouter"
    tier: 1
    provider_type: "openrouter"
    endpoint: "https://openrouter.ai/api/v1"
    model_id: "nvidia/nemotron-3-super-120b-a12b:free"
    cost_per_m_input: 0.00
    cost_per_m_output: 0.00
    max_context: 262144
    supports_tools: true
    supports_vision: false
    throughput_tps: 60
    enabled: true
    fallback_to: "gpt-5.4-mini"
    api_key_env: "OPENROUTER_API_KEY"
    extra:
      timeout: 600.0

  # ── Tier 2: Primary — GPT 5.4 (ChatGPT Subscription + Reasoning) ─
  # Full GPT 5.4 with reasoning.effort=high for deep thinking.
  # 1M context window. No per-token cost on subscription.
  # Auth: ChatGPT subscription via OAuth PKCE (python scripts/atlas-auth.py)
  - name: "gpt-5.4"
    tier: 2
    provider_type: "openai_oauth"
    endpoint: "https://chatgpt.com/backend-api/wham"
    model_id: "gpt-5.4"
    cost_per_m_input: 0.00
    cost_per_m_output: 0.00
    max_context: 1050000
    supports_tools: true
    supports_vision: true
    throughput_tps: 80
    enabled: true
    fallback_to: "mimo-v2-pro"
    api_key_env: ""
    extra:
      reasoning_effort: "xhigh"
      timeout: 180.0

  # ── Tier 2: Fallback — MiMo-V2-Pro ─────────────────────────────
  # Shootout: 5/5 (100%) at $1/$3, avg 1392ms
  # Same quality as Mini but 4x slower. Good backup.
  - name: "mimo-v2-pro"
    tier: 2
    provider_type: "openrouter"
    endpoint: "https://openrouter.ai/api/v1"
    model_id: "xiaomi/mimo-v2-pro"
    cost_per_m_input: 1.00
    cost_per_m_output: 3.00
    max_context: 131072
    supports_tools: true
    supports_vision: false
    throughput_tps: 60
    enabled: true
    fallback_to: "claude-opus-4-6"
    api_key_env: "OPENROUTER_API_KEY"
    extra:
      timeout: 600.0

  # ── Tier 3: Background Only (Evolution Daemon) ──────────────────
  - name: "minimax-m2.7"
    tier: 3
    provider_type: "openrouter"
    endpoint: "https://openrouter.ai/api/v1"
    model_id: "minimax/minimax-m2.7"
    cost_per_m_input: 0.30
    cost_per_m_output: 1.20
    max_context: 1048576
    supports_tools: true
    supports_vision: false
    throughput_tps: 100
    enabled: true
    fallback_to: null
    api_key_env: "OPENROUTER_API_KEY"
    extra:
      timeout: 600.0
      background_only: true
      description: "Self-evolution daemon ONLY. Never user-facing."

  # ── Tier 4: Premium (Budget-Gated) ──────────────────────────────
  - name: "claude-opus-4-6"
    tier: 4
    provider_type: "anthropic"
    endpoint: "https://api.anthropic.com"
    model_id: "claude-opus-4-6"
    cost_per_m_input: 15.00
    cost_per_m_output: 75.00
    max_context: 200000
    supports_tools: true
    supports_vision: true
    throughput_tps: 30
    enabled: true
    fallback_to: null
    api_key_env: "ANTHROPIC_API_KEY"

  # ── Fallback: Ollama (Offline/Local) — Qwen 3.5 27B Q3 ───────────
  # Pull first: ollama pull qwen3.5:27b-q3_K_M
  # Falls back to 9B if 27B not available locally.
  - name: "ollama-local"
    tier: 5
    provider_type: "ollama"
    endpoint: "http://localhost:11434"
    model_id: "qwen3.5:27b-q3_K_M"
    cost_per_m_input: 0.00
    cost_per_m_output: 0.00
    max_context: 131072
    supports_tools: true
    supports_vision: false
    throughput_tps: 25
    enabled: true
    fallback_to: "ollama-local-small"

  # ── Fallback: Ollama (Lighter) — Qwen 3.5 9B ──────────────────
  # Pull first: ollama pull qwen3.5:9b
  - name: "ollama-local-small"
    tier: 5
    provider_type: "ollama"
    endpoint: "http://localhost:11434"
    model_id: "qwen3.5:9b"
    cost_per_m_input: 0.00
    cost_per_m_output: 0.00
    max_context: 131072
    supports_tools: true
    supports_vision: false
    throughput_tps: 40
    enabled: true
    fallback_to: null
    api_key_env: ""

# ── Budget Caps ────────────────────────────────────────────────
budget:
  opus_daily_usd: 15.00
  opus_monthly_usd: 100.00
  evolution_daily_usd: 5.00
  evolution_monthly_usd: 50.00
  total_monthly_cap_usd: 200.00

# ── Tier Routing Thresholds ────────────────────────────────────
# These map complexity scores to tiers (overridden by scorer_weights.yaml)
routing:
  tier_1_max_score: 0.4    # Scores below this → Tier 1
  tier_2_max_score: 0.7    # Scores 0.4-0.7 → Tier 2
  tier_4_min_score: 0.7    # Scores above this → Tier 4 (with budget gate)

# ── Shootout Data (2026-03-19) ─────────────────────────────────
# Benchmark: 5 diverse tasks (code, security, copy, research, planning)
# Grader: Sonnet 4.6 via llm-rubric
#
# Results:
#   GPT 5.4 Mini:   5/5 (100%)  332ms   $0.75/$4.50
#   MiMo-V2-Pro:    5/5 (100%)  1392ms  $1.00/$3.00
#   GPT 5.4 Nano:   4/5 (80%)   702ms   $0.20/$1.25
#   Nemotron 120B:  1/5 (20%)   379ms   FREE
#   Qwen 3.5 397B:  1/5 (20%)   981ms   $0.39/$2.34

name: Deploy ABLE Gateway

on:
  push:
    branches: [main]
    paths:
      - 'able/**'
      - 'docker-compose.yml'
      - '.github/workflows/deploy.yml'
  workflow_dispatch:
    inputs:
      profile:
        description: "Build profile"
        required: false
        default: "slim"
        type: choice
        options:
          - slim
          - full
      server_host:
        description: "Server IP/hostname (blank = use default)"
        required: false
        default: ""

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/able-gateway

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
      packages: write

    outputs:
      image_tag: ${{ steps.meta.outputs.tags }}
      image_digest: ${{ steps.build.outputs.digest }}

    steps:
      - uses: actions/checkout@v5

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha,prefix=
            type=raw,value=latest

      - name: Build and push
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./able/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            PROFILE=${{ inputs.profile || 'slim' }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Print image info
        run: |
          echo "Image: ${{ steps.meta.outputs.tags }}"
          echo "Digest: ${{ steps.build.outputs.digest }}"

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    timeout-minutes: 5
    if: github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v5

      - name: Deploy to server
        uses: appleboy/ssh-action@v1.2.2
        env:
          IMAGE: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
          # All secrets passed as env vars → written to .env on server
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          ABLE_OWNER_TELEGRAM_ID: ${{ secrets.ATLAS_OWNER_TELEGRAM_ID }}
          ABLE_OWNER_USERNAME: ${{ secrets.ATLAS_OWNER_USERNAME }}
          NVIDIA_API_KEY: ${{ secrets.NVIDIA_API_KEY }}
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_OAUTH_AUTH_JSON: ${{ secrets.OPENAI_OAUTH_AUTH_JSON }}
          ABLE_TIMEZONE: ${{ secrets.ABLE_TIMEZONE || 'America/New_York' }}
          OLLAMA_API_KEY: ${{ secrets.OLLAMA_API_KEY }}
          OLLAMA_BASE_URL: ${{ secrets.OLLAMA_BASE_URL || 'http://localhost:11434' }}
          GITHUB_TOKEN_ABLE: ${{ secrets.ATLAS_GITHUB_TOKEN }}
          DO_API_TOKEN: ${{ secrets.DO_API_TOKEN }}
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          BRAVE_SEARCH_API_KEY: ${{ secrets.BRAVE_SEARCH_API_KEY }}
          PERPLEXITY_API_KEY: ${{ secrets.PERPLEXITY_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          NOTION_API_KEY: ${{ secrets.NOTION_API_KEY }}
          NOTION_DATABASE_ID: ${{ secrets.NOTION_DATABASE_ID }}
          STRIPE_SECRET_KEY: ${{ secrets.STRIPE_API_KEY }}
          STRIPE_WEBHOOK_SECRET: ${{ secrets.STRIPE_WEBHOOK_SECRET }}
          ABLE_SERVICE_TOKEN: ${{ secrets.ABLE_SERVICE_TOKEN }}
          GITHUB_WEBHOOK_SECRET: ${{ secrets.GITHUB_WEBHOOK_SECRET }}
        with:
          host: ${{ inputs.server_host || '146.190.142.68' }}
          username: root
          key: ${{ secrets.DO_SSH_KEY }}
          envs: IMAGE,TELEGRAM_BOT_TOKEN,ABLE_OWNER_TELEGRAM_ID,ABLE_OWNER_USERNAME,NVIDIA_API_KEY,OPENROUTER_API_KEY,ANTHROPIC_API_KEY,OPENAI_API_KEY,OPENAI_OAUTH_AUTH_JSON,ABLE_TIMEZONE,OLLAMA_API_KEY,OLLAMA_BASE_URL,GITHUB_TOKEN_ABLE,DO_API_TOKEN,VERCEL_TOKEN,BRAVE_SEARCH_API_KEY,PERPLEXITY_API_KEY,GEMINI_API_KEY,NOTION_API_KEY,NOTION_DATABASE_ID,STRIPE_SECRET_KEY,STRIPE_WEBHOOK_SECRET,ABLE_SERVICE_TOKEN,GITHUB_WEBHOOK_SECRET

          script: |
            set -euo pipefail

            echo "=== ABLE Docker Deploy ==="

            # Install Docker if missing (works on any Linux)
            if ! command -v docker &>/dev/null; then
              echo "Installing Docker..."
              curl -fsSL https://get.docker.com | sh
              systemctl enable --now docker
            fi

            # Create app directory
            install -d -m 700 /opt/able

            # Write .env (secrets from GitHub Actions)
            cat > /opt/able/.env <<EOF
            TELEGRAM_BOT_TOKEN=$TELEGRAM_BOT_TOKEN
            ABLE_OWNER_TELEGRAM_ID=$ABLE_OWNER_TELEGRAM_ID
            ABLE_OWNER_USERNAME=$ABLE_OWNER_USERNAME
            NVIDIA_API_KEY=$NVIDIA_API_KEY
            OPENROUTER_API_KEY=$OPENROUTER_API_KEY
            ANTHROPIC_API_KEY=$ANTHROPIC_API_KEY
            OPENAI_API_KEY=$OPENAI_API_KEY
            ABLE_TIMEZONE=$ABLE_TIMEZONE
            OLLAMA_API_KEY=$OLLAMA_API_KEY
            OLLAMA_BASE_URL=$OLLAMA_BASE_URL
            GITHUB_TOKEN=$GITHUB_TOKEN_ABLE
            DO_API_TOKEN=$DO_API_TOKEN
            VERCEL_TOKEN=$VERCEL_TOKEN
            BRAVE_SEARCH_API_KEY=$BRAVE_SEARCH_API_KEY
            PERPLEXITY_API_KEY=$PERPLEXITY_API_KEY
            GEMINI_API_KEY=$GEMINI_API_KEY
            NOTION_API_KEY=$NOTION_API_KEY
            NOTION_DATABASE_ID=$NOTION_DATABASE_ID
            STRIPE_SECRET_KEY=$STRIPE_SECRET_KEY
            STRIPE_WEBHOOK_SECRET=$STRIPE_WEBHOOK_SECRET
            ABLE_SERVICE_TOKEN=$ABLE_SERVICE_TOKEN
            GITHUB_WEBHOOK_SECRET=$GITHUB_WEBHOOK_SECRET
            WEBHOOK_PORT=8080
            EOF
            chmod 600 /opt/able/.env
            echo "✓ .env written"

            # Write OAuth token if available
            if [ -n "${OPENAI_OAUTH_AUTH_JSON:-}" ]; then
              mkdir -p /opt/able/auth
              echo "$OPENAI_OAUTH_AUTH_JSON" > /opt/able/auth/auth.json
              chown 1000:1000 /opt/able/auth/auth.json
              chmod 600 /opt/able/auth/auth.json
              echo "✓ OAuth token deployed"
            fi

            # Write docker-compose for server
            cat > /opt/able/docker-compose.yml <<'DCOMPOSE'
            services:
              able:
                image: ${IMAGE:-ghcr.io/iamthetonyb/able-gateway:latest}
                container_name: able-gateway
                restart: unless-stopped
                ports:
                  - "8080:8080"
                env_file:
                  - .env
                environment:
                  - ABLE_HOME=/home/able/.able
                  - PYTHONUNBUFFERED=1
                volumes:
                  - able_data:/home/able/.able
                  - able_db:/home/able/app/able/data
                healthcheck:
                  test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
                  interval: 30s
                  timeout: 10s
                  retries: 3
                  start_period: 15s
                logging:
                  driver: "json-file"
                  options:
                    max-size: "10m"
                    max-file: "5"

            volumes:
              able_data:
              able_db:
            DCOMPOSE
            # Strip leading whitespace from heredoc (GitHub Actions indentation)
            sed -i 's/^            //' /opt/able/docker-compose.yml
            # Inject auth volume mount if OAuth token exists
            if [ -f /opt/able/auth/auth.json ]; then
              sed -i '/able_db:\/home\/able\/app\/able\/data/a\      - /opt/able/auth/auth.json:/home/able/.able/auth.json:ro' /opt/able/docker-compose.yml
            fi
            # Replace IMAGE placeholder with actual image
            sed -i "s|\${IMAGE:-ghcr.io/iamthetonyb/able-gateway:latest}|${IMAGE}|" /opt/able/docker-compose.yml
            echo "✓ docker-compose.yml written"

            # Stop old systemd service if it exists
            if systemctl is-active --quiet able 2>/dev/null; then
              echo "Stopping old systemd service..."
              systemctl stop able
              systemctl disable able 2>/dev/null || true
            fi

            # Kill anything on port 8080 (old containers, orphaned processes)
            fuser -k 8080/tcp 2>/dev/null || true
            docker stop able-gateway 2>/dev/null || true
            docker rm able-gateway 2>/dev/null || true
            sleep 2

            # Pull and deploy
            cd /opt/able
            echo "Pulling ${IMAGE}..."
            docker pull "${IMAGE}" 2>&1 | tail -3

            echo "Starting container..."
            docker compose down 2>/dev/null || true
            IMAGE="${IMAGE}" docker compose up -d

            # Verify — use /health as the real gate (not docker compose ps text)
            echo "Waiting for /health..."
            for i in $(seq 1 30); do
              if curl -fsS http://127.0.0.1:8080/health >/dev/null 2>&1; then
                echo "✅ Health endpoint OK"
                break
              fi
              sleep 2
            done

            if ! curl -fsS http://127.0.0.1:8080/health >/dev/null 2>&1; then
              echo "❌ Health endpoint did not become ready"
              docker compose ps
              docker compose logs --tail 200
              exit 1
            fi

            echo "=== Recent logs ==="
            docker compose logs --tail 30

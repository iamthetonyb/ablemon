name: Deploy ATLAS to Digital Ocean

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy to Digital Ocean
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: 146.190.142.68
          username: root
          key: ${{ secrets.DO_SSH_KEY }}
          script: |
            set -e

            echo "=== Pulling latest code ==="
            if [ ! -d /opt/atlas/AIDE/.git ]; then
              git clone https://github.com/iamthetonyb/AIDE.git /opt/atlas/AIDE
            fi
            cd /opt/atlas/AIDE
            git fetch origin
            git reset --hard origin/main
            echo "✓ Code updated to $(git rev-parse --short HEAD)"

            echo "=== Ensuring python3-venv is installed ==="
            apt-get update -qq && apt-get install -y -qq python3-venv python3-pip > /dev/null

            echo "=== Setting up Python virtual environment ==="
            if [ ! -d /home/atlas/.atlas/venv ]; then
              python3 -m venv /home/atlas/.atlas/venv
              chown -R atlas:atlas /home/atlas/.atlas/venv
            fi
            /home/atlas/.atlas/venv/bin/pip install -r /opt/atlas/AIDE/atlas/requirements.txt --quiet --upgrade

            echo "=== Updating ATLAS files ==="
            rsync -av --delete /opt/atlas/AIDE/atlas/ /home/atlas/.atlas/atlas/
            cp /opt/atlas/AIDE/ATLAS.md /home/atlas/.atlas/ATLAS.md
            cp /opt/atlas/AIDE/SOUL.md /home/atlas/.atlas/SOUL.md
            chown -R atlas:atlas /home/atlas/.atlas/

            echo "=== Updating systemd service ==="
            cp /opt/atlas/AIDE/atlas/atlas.service /etc/systemd/system/atlas.service
            systemctl daemon-reload

            echo "=== Restarting ATLAS ==="
            systemctl restart atlas
            sleep 5

            echo "=== Verifying ==="
            systemctl is-active --quiet atlas \
              && echo "✅ ATLAS is running" \
              || { echo "❌ ATLAS failed to start"; journalctl -u atlas -n 20 --no-pager; exit 1; }

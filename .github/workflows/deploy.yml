name: Deploy ABLE to Digital Ocean

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      ref:
        description: "Git ref to deploy (main, branch, tag, or commit SHA)"
        required: false
        default: "main"

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      TARGET_REF: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.ref || 'main' }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v5
        with:
          ref: ${{ env.TARGET_REF }}

      - name: Deploy to Digital Ocean
        uses: appleboy/ssh-action@v1.2.2
        env:
          TARGET_REF: ${{ env.TARGET_REF }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          ABLE_OWNER_TELEGRAM_ID: ${{ secrets.ABLE_OWNER_TELEGRAM_ID }}
          ABLE_OWNER_USERNAME: ${{ secrets.ABLE_OWNER_USERNAME }}
          NVIDIA_API_KEY: ${{ secrets.NVIDIA_API_KEY }}
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          OLLAMA_API_KEY: ${{ secrets.OLLAMA_API_KEY }}
          OLLAMA_BASE_URL: ${{ secrets.OLLAMA_BASE_URL || 'http://localhost:11434' }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_OAUTH_AUTH_JSON: ${{ secrets.OPENAI_OAUTH_AUTH_JSON }}
          ABLE_TIMEZONE: ${{ secrets.ABLE_TIMEZONE || 'America/Los_Angeles' }}
          GITHUB_WEBHOOK_SECRET: ${{ secrets.GITHUB_WEBHOOK_SECRET }}
          NOTION_API_KEY: ${{ secrets.NOTION_API_KEY }}
          NOTION_DATABASE_ID: ${{ secrets.NOTION_DATABASE_ID }}
          GITHUB_TOKEN: ${{ secrets.ABLE_GITHUB_TOKEN }}
          DO_API_TOKEN: ${{ secrets.DO_API_TOKEN }}
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          BRAVE_SEARCH_API_KEY: ${{ secrets.BRAVE_SEARCH_API_KEY }}
          PERPLEXITY_API_KEY: ${{ secrets.PERPLEXITY_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          STRIPE_SECRET_KEY: ${{ secrets.STRIPE_API_KEY }}
          STRIPE_WEBHOOK_SECRET: ${{ secrets.STRIPE_WEBHOOK_SECRET }}
          ABLE_SERVICE_TOKEN: ${{ secrets.ABLE_SERVICE_TOKEN }}
        with:
          host: 146.190.142.68
          username: root
          key: ${{ secrets.DO_SSH_KEY }}
          envs: TARGET_REF,TELEGRAM_BOT_TOKEN,ABLE_OWNER_TELEGRAM_ID,ABLE_OWNER_USERNAME,NVIDIA_API_KEY,OPENROUTER_API_KEY,ANTHROPIC_API_KEY,OLLAMA_API_KEY,OLLAMA_BASE_URL,OPENAI_API_KEY,OPENAI_OAUTH_AUTH_JSON,ABLE_TIMEZONE,GITHUB_WEBHOOK_SECRET,NOTION_API_KEY,NOTION_DATABASE_ID,GITHUB_TOKEN,DO_API_TOKEN,VERCEL_TOKEN,BRAVE_SEARCH_API_KEY,PERPLEXITY_API_KEY,GEMINI_API_KEY,STRIPE_SECRET_KEY,STRIPE_WEBHOOK_SECRET,ABLE_SERVICE_TOKEN

          script: |
            set -euo pipefail

            echo "=== Ensuring able system user exists ==="
            if ! getent group able >/dev/null 2>&1; then
              groupadd --system able
            fi
            if ! id -u able >/dev/null 2>&1; then
              useradd --system --gid able --create-home --home-dir /home/able --shell /bin/bash able
            fi
            install -d -o able -g able /opt/able /home/able/.able

            echo "=== Pulling target ref ==="
            if [ ! -d /opt/able/ABLE/.git ]; then
              git clone https://github.com/iamthetonyb/ABLE.git /opt/able/ABLE
            fi
            cd /opt/able/ABLE
            git fetch --tags origin "${TARGET_REF}"
            git checkout -B deployed FETCH_HEAD
            chown -R able:able /opt/able/ABLE
            mkdir -p /opt/able/ABLE/data
            chown -R able:able /opt/able/ABLE/data
            echo "✓ Code updated to $(git rev-parse --short HEAD) from ${TARGET_REF}"

            echo "=== Updating .env file ==="
            mkdir -p /home/able/.able
            cat <<EOF > /home/able/.able/.env
            TELEGRAM_BOT_TOKEN=$TELEGRAM_BOT_TOKEN
            ABLE_OWNER_TELEGRAM_ID=$ABLE_OWNER_TELEGRAM_ID
            ABLE_OWNER_USERNAME=$ABLE_OWNER_USERNAME
            NVIDIA_API_KEY=$NVIDIA_API_KEY
            OPENROUTER_API_KEY=$OPENROUTER_API_KEY
            ANTHROPIC_API_KEY=$ANTHROPIC_API_KEY
            OLLAMA_API_KEY=$OLLAMA_API_KEY
            OLLAMA_BASE_URL=$OLLAMA_BASE_URL
            OPENAI_API_KEY=$OPENAI_API_KEY
            ABLE_TIMEZONE=$ABLE_TIMEZONE
            GITHUB_WEBHOOK_SECRET=$GITHUB_WEBHOOK_SECRET
            NOTION_API_KEY=$NOTION_API_KEY
            NOTION_DATABASE_ID=$NOTION_DATABASE_ID
            GITHUB_TOKEN=$GITHUB_TOKEN
            DO_API_TOKEN=$DO_API_TOKEN
            VERCEL_TOKEN=$VERCEL_TOKEN
            BRAVE_SEARCH_API_KEY=$BRAVE_SEARCH_API_KEY
            PERPLEXITY_API_KEY=$PERPLEXITY_API_KEY
            GEMINI_API_KEY=$GEMINI_API_KEY
            STRIPE_ENABLED=true
            STRIPE_SECRET_KEY=$STRIPE_SECRET_KEY
            STRIPE_WEBHOOK_SECRET=$STRIPE_WEBHOOK_SECRET
            STRIPE_CREDITS_PER_USD=100
            ABLE_SERVICE_TOKEN=$ABLE_SERVICE_TOKEN
            WEBHOOK_PORT=8080
            EOF
            chown able:able /home/able/.able/.env
            chmod 600 /home/able/.able/.env
            echo "✓ .env file updated securely"

            echo "=== Deploying OpenAI OAuth token ==="
            if [ -n "$OPENAI_OAUTH_AUTH_JSON" ]; then
              echo "$OPENAI_OAUTH_AUTH_JSON" > /home/able/.able/auth.json
              chown able:able /home/able/.able/auth.json
              chmod 600 /home/able/.able/auth.json
              echo "✓ OAuth file written ($(wc -c < /home/able/.able/auth.json) bytes)"
              echo "  First 80 chars: $(head -c 80 /home/able/.able/auth.json)"
            else
              echo "⚠ OPENAI_OAUTH_AUTH_JSON not set — T1/T2 will fall back to Nemotron/MiMo"
            fi

            echo "=== Ensuring python3-venv is installed ==="
            apt-get update -qq && apt-get install -y -qq python3-venv python3-pip > /dev/null

            echo "=== Setting up Python virtual environment ==="
            if [ ! -d /home/able/.able/venv ]; then
              python3 -m venv /home/able/.able/venv
              chown -R able:able /home/able/.able/venv
            fi
            /home/able/.able/venv/bin/pip install -r /opt/able/ABLE/able/requirements.txt --quiet --upgrade
            /home/able/.able/venv/bin/pip install -e /opt/able/ABLE --quiet --upgrade
            chown -R able:able /home/able/.able/

            echo "=== Updating systemd service ==="
            cp /opt/able/ABLE/able/able.service /etc/systemd/system/able.service
            systemctl daemon-reload

            echo "=== Restarting ABLE ==="
            systemctl restart able
            sleep 5

            echo "=== Verifying ==="
            systemctl is-active --quiet able \
              && echo "✅ ABLE is running" \
              || { echo "❌ ABLE failed to start"; journalctl -u able -n 40 --no-pager; exit 1; }

            curl -fsS http://127.0.0.1:8080/health >/dev/null \
              && echo "✅ Health endpoint responding" \
              || { echo "❌ Health endpoint failed"; journalctl -u able -n 40 --no-pager; exit 1; }

            echo "=== Startup logs (last 80 lines) ==="
            journalctl -u able -n 80 --no-pager

            echo "=== OAuth provider diagnostic ==="
            sudo -u able /home/able/.able/venv/bin/python3 /opt/able/ABLE/scripts/oauth-diagnostic.py 2>&1 || echo "⚠ OAuth diagnostic failed (see output above)"
